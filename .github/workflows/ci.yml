name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Lint for undefined names (dropped imports)
        run: |
          out=$(python -m pyflakes hellcats/*.py || true)
          echo "$out"
          if echo "$out" | grep -qi "undefined name"; then
            echo "::error::undefined names found (likely a dropped import)"
            exit 1
          fi
          echo "no undefined names"

      - name: Run test suite (headless SDL)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m unittest discover -s tests -v

      - name: Playtest checklist
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python scripts/playtest_checklist.py
